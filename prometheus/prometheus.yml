global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "discord_bot"
    scrape_interval: 5s
    static_configs:
      - targets: ["bot:9091"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
